apiVersion: v1
kind: ConfigMap
metadata:
  name: hello-html

data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
      <title>Hello World</title>
    </head>
    <body>
      <h1>Hello World</h1>
    </body>
    </html>

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-nginx

spec:
  replicas: 1

  selector:
    matchLabels:
      app: hello-nginx

  template:
    metadata:
      labels:
        app: hello-nginx

    spec:
      containers:
      - name: nginx
        image: nginx:latest

        ports:
        - containerPort: 80

        volumeMounts:
        - name: html
          mountPath: /usr/share/nginx/html

      volumes:
      - name: html
        configMap:
          name: hello-html
