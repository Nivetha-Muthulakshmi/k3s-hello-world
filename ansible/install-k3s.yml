- hosts: k3s
  become: yes

  tasks:

    - name: Install dependencies
      apt:
        name:
          - curl
        state: present
        update_cache: yes

    - name: Install k3s
      shell: |
        curl -sfL https://get.k3s.io | sh -

    - name: Enable k3s
      systemd:
        name: k3s
        enabled: yes
        state: started
