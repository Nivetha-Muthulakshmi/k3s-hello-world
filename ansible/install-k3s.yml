- hosts: k3s
  become: yes

  vars:
    public_ip: "3.81.55.247"

  tasks:

    - name: Install dependencies
      apt:
        name:
          - curl
        state: present
        update_cache: yes

    - name: Install latest stable k3s
      shell: |
        curl -sfL https://get.k3s.io | \
        INSTALL_K3S_EXEC="server --tls-san {{ public_ip }}" sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Enable and start k3s
      systemd:
        name: k3s
        enabled: yes
        state: started

    - name: Wait for k3s to become ready
      command: kubectl get nodes
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: result
      retries: 15
      delay: 10
      until: result.rc == 0
